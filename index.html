<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <title>Pratiyog'26 | Jeppiaar Engineering College</title>
    <meta name="description" content="Pratiyog'26 - Grand AI & ML Symposium and Cultural Fest at Jeppiaar Engineering College, Chennai" />
    <meta name="author" content="Jeppiaar Engineering College" />
    
    <meta property="og:title" content="Pratiyog'26" />
    <meta property="og:description" content="Epic AI & ML Department Symposium × Cultural Extravaganza" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" /> <!-- add your event poster here later -->
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pratiyog'26" />
    <meta name="twitter:description" content="AI & ML Symposium | Jeppiaar Engineering College" />

    <!-- Premium fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0a001f, #1a0033, #2a004d);
        color: #ffffff;
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
        z-index: 10;
        pointer-events: none;
      }

      .main-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 18vw;
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: 0.08em;
        background: linear-gradient(90deg, #00f0ff, #ff00aa, #00f0ff, #ff00aa);
        background-size: 300% 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 
          0 0 30px rgba(0, 240, 255, 0.8),
          0 0 60px rgba(255, 0, 170, 0.7),
          0 0 100px rgba(0, 240, 255, 0.5);
        animation: gradient 8s ease infinite, glow 2.5s ease-in-out infinite alternate;
      }

      .tagline {
        font-size: 4.5vw;
        font-weight: 800;
        margin: 30px 0 50px;
        color: #00f0ff;
        text-shadow: 0 0 40px rgba(0, 240, 255, 0.6);
        letter-spacing: 4px;
      }

      .college-name {
        font-size: 3vw;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.85);
        margin-top: 40px;
        letter-spacing: 3px;
      }

      @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      @keyframes glow {
        from {
          text-shadow: 0 0 20px #00f0ff, 0 0 40px #ff00aa, 0 0 60px #00f0ff;
        }
        to {
          text-shadow: 0 0 50px #00f0ff, 0 0 90px #ff00aa, 0 0 140px #00f0ff;
        }
      }

      /* Make sure React app can take over */
      #root {
        width: 100%;
        height: 100vh;
        position: relative;
        z-index: 5;
      }

      @media (max-width: 768px) {
        .main-title   { font-size: 22vw; }
        .tagline      { font-size: 7vw;  margin: 20px 0 40px; }
        .college-name { font-size: 5.5vw; margin-top: 30px; }
      }

      @media (max-width: 480px) {
        .main-title   { font-size: 26vw; }
        .tagline      { font-size: 8.5vw; }
        .college-name { font-size: 6.5vw; }
      }
    </style>
  </head>

  <body>
    <!-- Big splash screen for instant impact (fades out or gets covered by React app) -->
    <div id="splash">
      <h1 class="main-title">PRATIYOG'26</h1>
      <p class="tagline">AI & ML SYMPOSIUM × CULTURAL FIESTA</p>
      <p class="college-name">JEPPIAAR ENGINEERING COLLEGE</p>
    </div>

    <!-- React will mount here -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
